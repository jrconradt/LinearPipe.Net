name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build LinearPipe.Net.slnx -c Release

      - name: Test
        run: dotnet test LinearPipe.Net.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack src/LinearPipe.Net/LinearPipe.Net.csproj -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
